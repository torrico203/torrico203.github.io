<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="site.title">임재균 — 게임 기획·개발 포트폴리오</title>
    <meta name="description" content="임재균 (JaeGyun Lim) — 11년차 게임 기획·개발자. 16종 프로젝트를 PD/PM/PO로 리딩." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a href="#top" class="topbar__brand" data-content="profile.name">임재균</a>
        <nav class="topbar__nav" aria-label="primary">
          <a href="#about"        data-i18n="nav.about">소개</a>
          <a href="#experience"   data-i18n="nav.experience">경력</a>
          <a href="#projects"     data-i18n="nav.projects">프로젝트</a>
          <a href="#publishing"   data-i18n="nav.publishing">사업 이력</a>
          <a href="#contact"      data-i18n="nav.contact">연락처</a>
        </nav>
        <button id="lang-toggle" class="lang-toggle" type="button" aria-label="language">
          <span data-i18n="lang.toggle">EN</span>
        </button>
      </div>
    </header>

    <main id="top">
      <!-- Hero -->
      <section class="hero">
        <div class="container hero__inner">
          <img class="hero__photo" alt="" data-attr-src="profile.photo" />
          <div class="hero__text">
            <h1 class="hero__name">
              <span data-content="profile.name">임재균</span>
              <span class="hero__hanja" data-content="profile.nameHanja">任宰均</span>
            </h1>
            <p class="hero__headline" data-content="profile.headline"></p>
            <div class="hero__actions">
              <button type="button" class="btn btn--primary" onclick="window.print()" data-i18n="hero.printResume">이력서 PDF로 인쇄</button>
              <a href="#contact" class="btn btn--ghost" data-i18n="hero.contact">연락하기</a>
            </div>
          </div>
        </div>
      </section>

      <!-- About -->
      <section id="about" class="section">
        <div class="container">
          <h2 class="section__title" data-i18n="section.about">소개</h2>
          <div class="tabs" role="tablist">
            <button class="tab is-active" role="tab" data-tab="summary" data-i18n="intro.tabs.summary">요약</button>
            <button class="tab"           role="tab" data-tab="pm"      data-i18n="intro.tabs.pm">PM 자기소개</button>
            <button class="tab"           role="tab" data-tab="dev"     data-i18n="intro.tabs.dev">개발자 자기소개</button>
          </div>
          <div class="tab-panels">
            <div class="tab-panel is-active" data-panel="summary" data-render="aboutSummary"></div>
            <div class="tab-panel"           data-panel="pm"      data-render="aboutPM"></div>
            <div class="tab-panel"           data-panel="dev"     data-render="aboutDev"></div>
          </div>
        </div>
      </section>

      <!-- Skills -->
      <section id="skills" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-i18n="section.skills">기술 스택</h2>
          <ul class="chips" data-render="skills"></ul>
        </div>
      </section>

      <!-- Experience + Education -->
      <section id="experience" class="section">
        <div class="container">
          <h2 class="section__title" data-i18n="section.experience">경력</h2>
          <ol class="timeline" data-render="experience"></ol>

          <h2 class="section__title section__title--sub" data-i18n="section.education">학력</h2>
          <ol class="timeline" data-render="education"></ol>
        </div>
      </section>

      <!-- Projects -->
      <section id="projects" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-i18n="section.projects">프로젝트</h2>
          <div class="cards" data-render="projects"></div>
        </div>
      </section>

      <!-- Business: Publishing / Awards / Gov projects -->
      <section id="publishing" class="section">
        <div class="container">
          <h2 class="section__title" data-i18n="section.publishing">퍼블리싱·투자 이력</h2>
          <ol class="event-list" data-render="publishing"></ol>

          <h2 class="section__title section__title--sub" data-i18n="section.awards">수상 내역</h2>
          <ol class="cred-cards" data-render="awards"></ol>

          <h2 class="section__title section__title--sub" data-i18n="section.govProjects">정부과제 수행 이력</h2>
          <div class="table-wrap"><table class="data-table" data-render="govProjects"></table></div>
        </div>
      </section>

      <!-- Resume extras: Certs / Military -->
      <section id="resume-extras" class="section section--alt">
        <div class="container">
          <h2 class="section__title" data-i18n="section.certifications">자격증</h2>
          <ol class="cred-cards" data-render="certifications"></ol>

          <h2 class="section__title section__title--sub" data-i18n="section.military">병역</h2>
          <p data-render="military"></p>
        </div>
      </section>

      <!-- Contact -->
      <section id="contact" class="section">
        <div class="container">
          <h2 class="section__title" data-i18n="section.contact">연락처</h2>
          <dl class="contact" data-render="contact"></dl>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <span data-i18n="footer.copyright">© 2025 torrico203</span>
      </div>
    </footer>

    <script src="assets/data.js"></script>
    <script src="assets/i18n.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
